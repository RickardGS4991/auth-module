
services:
  postgres:
    image: postgres:16
    container_name: tandapp-postgresql
    environment:
      POSTGRES_USER: tandapp
      POSTGRES_PASSWORD: tandapp
      POSTGRES_DB: tandapp
    ports:
      - "5432:5432"
    volumes:
      - tandapp_pgdata:/var/lib/postgresql/data

volumes:
  tandapp_pgdata:

